var STORAGE_KEY = 'sp5a_links_v2';
var _editMode=false;
function toggleEdit(){_editMode=!_editMode;document.body.classList.toggle('edit-mode',_editMode);
  var et=document.getElementById('editToggle');if(et)et.textContent=_editMode?'完成编辑':'✎ 编辑直达链接';}
function saveLink(si,pi){
  var inp=document.getElementById('li_'+si+'_'+pi);if(!inp)return;
  var v=inp.value.trim();var m=loadLinks();var k=si+'_'+pi;
  if(v){m[k]=v;toast('链接已保存')}else{delete m[k];toast('链接已清空')}
  saveLinks(m);renderCards(document.getElementById('provinceFilter').value,document.getElementById('cityFilter').value,document.getElementById('searchInput').value.trim().toLowerCase());
}
function clearLink(si,pi){
  var inp=document.getElementById('li_'+si+'_'+pi);if(inp)inp.value='';
  var m=loadLinks();var k=si+'_'+pi;delete m[k];saveLinks(m);
  toast('链接已清除');renderCards(document.getElementById('provinceFilter').value,document.getElementById('cityFilter').value,document.getElementById('searchInput').value.trim().toLowerCase());
}
function loadLinks(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch(e){return {}}}
function saveLinks(m){localStorage.setItem(STORAGE_KEY,JSON.stringify(m))}

var _t2;
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_t2);_t2=setTimeout(function(){t.classList.remove('show')},2200)}

function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){toast('已复制')}).catch(function(){copyFallback(t)})}else{copyFallback(t)}
}
function copyFallback(t){
  var e=document.createElement('textarea');e.value=t;e.style.position='fixed';e.style.opacity='0';
  document.body.appendChild(e);e.select();
  try{document.execCommand('copy');toast('已复制')}catch(e){toast('复制失败')}
  document.body.removeChild(e);
}

var _mk='';
function openModal(kw,desc,icon){
  _mk=kw;
  document.getElementById('modalKeyword').textContent=kw;
  if(desc)document.getElementById('modalDesc').textContent=desc;
  if(icon)document.getElementById('modalIcon').textContent=icon;
  var b=document.getElementById('copyBtn');b.textContent='复制';b.className='cpy-btn';
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});
function copyModalKeyword(){copyText(_mk);var b=document.getElementById('copyBtn');b.textContent='已复制';b.className='cpy-btn done'}

function isWxBrowser(){return navigator.userAgent.toLowerCase().indexOf('micromessenger')>-1}

function launch(idx,pi){
  var s=SPOTS[idx];var p=s.p[pi];
  var links=loadLinks();var link=links[idx+'_'+pi]||p.l||'';
  if(p.t==='web'&&link.indexOf('http')===0){window.open(link,'_blank');return}
  if(link){copyText(link)
    if(isWxBrowser()&&link.indexOf('#小程序://')===0){openModal(link)}
    else if(isWxBrowser()){window.location.href=link}
    else if(link.indexOf('#小程序://')===0){var a=document.createElement('a');a.style.display='none';a.href='weixin://';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){openModal(link)},400)}
  }else{copyText(p.l||s[2]);toast('已复制名称')}
}

function onFilterChange(){
  var pv=document.getElementById('provinceFilter').value;
  var ct=document.getElementById('cityFilter').value;
  var kw=document.getElementById('searchInput').value.trim().toLowerCase();
  renderCards(pv,ct,kw);
  var cs=document.getElementById('cityFilter');var cc=cs.value;
  cs.innerHTML='<option value="">全部城市</option>';
  if(pv&&PROVINCE_CITIES[pv]){PROVINCE_CITIES[pv].forEach(function(c){cs.innerHTML+='<option value="'+c+'">'+c+'</option>'})}
  cs.value=cc;
}
function resetFilters(){document.getElementById('provinceFilter').value='';document.getElementById('cityFilter').value='';document.getElementById('searchInput').value='';onFilterChange()}

function renderCards(pv,ct,kw){
  var el=document.getElementById('cardList');
  var links=loadLinks();
  var h='';var shown=0;var lastProv='';
  SPOTS.forEach(function(s,idx){
    if(pv&&s[0]!==pv)return;
    if(ct&&s[1]!==ct)return;
    if(kw&&s[2].toLowerCase().indexOf(kw)===-1&&s[0].toLowerCase().indexOf(kw)===-1&&s[1].toLowerCase().indexOf(kw)===-1)return;
    shown++;
    if(s[0]!==lastProv){
      if(lastProv!=='')h+='</div>';
      lastProv=s[0];
      h+='<div class="group-header"><span>'+s[0]+'</span><span class="count">'+SPOTS.filter(function(x){return x[0]===s[0]}).length+'个景区</span></div>';
    }
    var ph='';var platList=
    (s.p||[{t:"wx",l:s[2],d:"景区官方小程序（待确认）"}]).forEach(function(p,pi){
      var lk=idx+'_'+pi;var sl=links[lk]||'';
      var bc='badge-'+p.t;var bl=p.t==='wx'?'微信小程序':p.t==='web'?'公众号/官网':'OTA平台';
      var bc2='btn-secondary';var bt='打开';
      if(p.t==='web'&&sl.indexOf('http')===0){bc2='btn-web';bt='打开网址'}
      else if(sl){bc2='btn-primary';bt='一键打开'}
      var dd=sl?'<div class="desc">已配置直达链接</div>':'<div class="desc">'+(p.d||'')+'</div>';
      var ln=(p.l||'').replace(/'/g,"\\'");
      ph+='<div class="platform"><span class="badge '+bc+'">'+bl+'</span><div class="info"><span class="name-label">'+(p.l||'')+'</span>'+dd+'<div class="actions">';
      ph+='<a class="btn '+bc2+'" href="javascript:;" onclick="launch('+idx+','+pi+')">'+bt+'</a>';
      if(p.t==='wx')ph+='<a class="btn btn-ghost" href="javascript:;" onclick="copyText(this.dataset.name)" data-name="'+(p.l||'')+'">复制名称</a>';
      ph+='<div class="link-field"><input type="text" id="li_'+idx+'_'+pi+'" placeholder="粘贴直达链接" value="'+(sl||'')+'"><button class="save-btn" onclick="saveLink('+idx+','+pi+')">保存</button>'+(sl?'<button class="clear-btn" onclick="clearLink('+idx+','+pi+')">清除</button>':'')+'<span class="hint">'+(sl?'已配置':'填入链接')+'</span></div>';
  ph+='</div></div></div>';
    });
    h+='<div class="card"><div class="card-header"><span class="name">'+s[2]+'</span><div class="meta"><span class="city-tag">'+s[1]+'</span><span class="province-tag">'+s[0]+'</span></div></div><div class="card-body">'+ph+'</div></div>';
  });
  if(lastProv!=='')h+='</div>';
  if(shown===0)h='<div class="empty"><div class="big">🔍</div>没有找到匹配的景区<br><span style="font-size:12px;color:#94a3b8">试试调整筛选条件</span></div>';
  el.innerHTML=h;document.getElementById('shownCount').textContent=shown;
}

renderCards('','','');
